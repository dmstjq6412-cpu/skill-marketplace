databases:
  - name: skill-marketplace-db
    databaseName: skill_marketplace
    user: skill_marketplace

services:
  - type: web
    name: skill-marketplace-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false  # Vercel 배포 후 직접 입력
      - key: DATABASE_URL
        fromDatabase:
          name: skill-marketplace-db
          property: connectionString
